  <circle cx="100" cy="550" r="150" fill="#eff6ff" opacity="0.6"/>

  <!-- Logo Icon (centered-left area) -->
  <rect x="80" y="225" width="100" height="100" rx="22" fill="#2563eb"/>
  <rect x="106" y="248" width="48" height="18" rx="5" fill="white"/>
  <rect x="121" y="233" width="18" height="48" rx="5" fill="white"/>

